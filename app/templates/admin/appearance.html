{% extends "admin/index.html" %}

{% block title %}Erscheinungsbild - Admin - IFAS-Assistent{% endblock %}

{% block admin_content %}
<div class="px-1 py-1">
    <h1 class="text-xl font-bold text-slate-800 mb-6 flex items-center gap-3">
        <i data-lucide="sun-moon" class="w-6 h-6 text-primary-600"></i>
        Erscheinungsbild anpassen
    </h1>

    <form method="POST" class="space-y-8">
        <!-- Theme Selection -->
        <div class="glass rounded-2xl border border-white/20 p-6">
            <h2 class="text-lg font-semibold text-slate-800 mb-6 flex items-center gap-2">
                <i data-lucide="layout" class="w-5 h-5 text-indigo-600"></i>
                Vorgefertigte Themes
            </h2>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <!-- Standard Theme (Light) -->
                <label class="relative cursor-pointer group">
                    <input type="radio" name="theme_mode" value="light" class="peer sr-only"
                        onchange="this.form.submit()" {{ 'checked' if config.get('theme_mode', 'light' )=='light' }}>
                    <div
                        class="p-4 rounded-2xl border-2 border-slate-200 peer-checked:border-primary-600 peer-checked:bg-primary-50 transition-all hover:bg-slate-50 h-full">
                        <div
                            class="aspect-video rounded-lg bg-white border border-slate-200 mb-3 overflow-hidden text-center flex items-center justify-center">
                            <i data-lucide="sun" class="w-8 h-8 text-amber-500"></i>
                        </div>
                        <span class="block text-center font-medium text-slate-700">Hell (Standard)</span>
                    </div>
                    <div class="absolute top-2 right-2 hidden peer-checked:block">
                        <i data-lucide="check-circle-2" class="w-5 h-5 text-primary-600"></i>
                    </div>
                </label>

                <!-- Dark Mode -->
                <label class="relative cursor-pointer group">
                    <input type="radio" name="theme_mode" value="dark" class="peer sr-only"
                        onchange="this.form.submit()" {{ 'checked' if config.get('theme_mode')=='dark' }}>
                    <div
                        class="p-4 rounded-2xl border-2 border-slate-200 peer-checked:border-slate-800 peer-checked:bg-slate-900 transition-all hover:bg-slate-50 h-full">
                        <div
                            class="aspect-video rounded-lg bg-slate-800 border border-slate-700 mb-3 overflow-hidden text-center flex items-center justify-center">
                            <i data-lucide="moon" class="w-8 h-8 text-indigo-400"></i>
                        </div>
                        <span class="block text-center font-medium text-slate-700 peer-checked:text-white">Dunkel</span>
                    </div>
                    <div class="absolute top-2 right-2 hidden peer-checked:block">
                        <i data-lucide="check-circle-2" class="w-5 h-5 text-primary-400"></i>
                    </div>
                </label>
            </div>

            <!-- Hidden Ambient as 50 default since we removed the slider -->
            <input type="hidden" name="theme_ambient" value="50">
        </div>

    </form>
</div>
{% endblock %}

{% block scripts %}
<script>
    // Simplified script since interactive elements are removed
    console.log('Appearance settings loaded - Instant switch enabled.');
</script>
{% endblock %}
